<style>
  :root {
    --hc-bg: #e8edf3;
    --hc-surface: #f7f9fc;
    --hc-card: #ffffff;
    --hc-border: #cfd7e4;
    --hc-text: #1b2a40;
    --hc-muted: #5d6c82;
    --hc-blue: #355b86;
    --hc-blue-deep: #2a4669;
    --kpi-a: #ecf3fb;
    --kpi-b: #eef4f0;
    --kpi-c: #f4f1e8;
    --kpi-d: #eef0f6;
  }

  #root {
    padding: 18px;
    background: var(--hc-bg);
    min-height: 100vh;
    color: var(--hc-text);
    font-family: "Segoe UI", Arial, sans-serif;
  }

  .report-page {
    max-width: 1160px;
    margin: 0 auto;
  }

  .hero-band {
    border-radius: 14px;
    padding: 16px 20px;
    background: linear-gradient(135deg, #2c4a70 0%, #365b86 100%);
    color: #fff;
    box-shadow: 0 10px 24px rgba(30, 53, 83, 0.18);
    margin-bottom: 12px;
  }

  .hero-title {
    margin: 0;
    font-size: 42px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .toolbar-card {
    border: 1px solid var(--hc-border);
    border-radius: 12px;
    background: var(--hc-surface);
    padding: 12px;
    margin-bottom: 12px;
  }

  .toolbar-grid {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: end;
  }

  .toolbar-cell {
    min-width: 180px;
  }

  .toolbar-label {
    display: block;
    font-size: 12px;
    color: var(--hc-muted);
    margin-bottom: 4px;
  }
  .print-btn {
    animation: printFloat 2.6s ease-in-out infinite;
    will-change: transform;
  }

  @keyframes printFloat {
    0% { transform: translateY(0); }
    50% { transform: translateY(-2px); }
    100% { transform: translateY(0); }
  }

  .kpi-row {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(4, minmax(180px, 1fr));
    margin-bottom: 12px;
  }

  .kpi-card {
    border: 1px solid var(--hc-border);
    border-radius: 12px;
    padding: 10px 12px;
    min-height: 92px;
    box-shadow: 0 2px 10px rgba(30, 53, 83, 0.05);
  }
  .kpi-card.clickable {
    cursor: pointer;
    transition: transform 0.16s ease, box-shadow 0.16s ease;
  }
  .kpi-card.clickable:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(30, 53, 83, 0.1);
  }

  .kpi-a { background: var(--kpi-a); }
  .kpi-b { background: var(--kpi-b); }
  .kpi-c { background: var(--kpi-c); }
  .kpi-d { background: var(--kpi-d); }

  .kpi-label {
    font-size: 11px;
    color: #4d607a;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .kpi-value {
    font-size: 44px;
    line-height: 1;
    font-weight: 700;
    color: #1e3859;
  }

  .period-note {
    margin: 6px 0 12px;
    color: #2f4868;
    font-size: 16px;
  }

  #table-container {
    overflow-y: auto;
  }

  .section-card {
    border: 1px solid var(--hc-border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
    background: var(--hc-card);
    box-shadow: 0 3px 14px rgba(30, 53, 83, 0.06);
    break-inside: avoid-page;
    page-break-inside: avoid;
  }

  .section-head {
    border-bottom: 1px solid var(--hc-border);
    padding: 10px 14px;
    background: #eef3f9;
  }

  .section-title {
    margin: 0;
    font-size: 32px;
    font-weight: 700;
    color: #183556;
  }

  .section-body {
    padding: 8px;
  }

  .report-table {
    margin-bottom: 0 !important;
    background: #fcfdff;
  }

  .report-table thead th {
    background: #e7edf6;
    color: #243f61;
    border-color: #d2dbe9 !important;
    font-size: 18px;
    font-weight: 700;
    padding: 8px 10px;
  }

  .report-table td {
    border-color: #d8e0ec !important;
    color: #22364f;
    font-size: 24px;
    padding: 8px 10px;
    vertical-align: middle;
  }

  .report-table .table-info,
  .report-table .table-info > td {
    background: #d7e8ee !important;
    border-color: #c1d7df !important;
  }

  .cell-left {
    text-align: left;
  }

  .cell-right {
    text-align: right;
    font-style: italic;
  }

  .ingredients-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(21, 33, 49, 0.32);
    z-index: 1200;
  }

  .ingredients-modal {
    position: fixed;
    top: 0;
    right: 0;
    width: min(520px, 94vw);
    height: 100vh;
    background: #f8fbff;
    border-left: 1px solid var(--hc-border);
    box-shadow: -18px 0 34px rgba(21, 33, 49, 0.2);
    transform: translateX(104%);
    transition: transform 0.2s ease;
    z-index: 1300;
    display: flex;
    flex-direction: column;
  }

  .ingredients-modal.is-open {
    transform: translateX(0);
  }

  .ingredients-modal-head {
    padding: 12px 14px;
    border-bottom: 1px solid var(--hc-border);
    background: #e9eff8;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .ingredients-modal-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .ingredients-modal-title {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    color: #1f3a5b;
  }

  .ingredients-modal-body {
    overflow: auto;
    padding: 10px 12px 14px;
  }

  .ingredients-summary-meta {
    color: #465b79;
    font-size: 13px;
    margin-bottom: 8px;
  }

  @media (max-width: 1200px) {
    .hero-title { font-size: 34px; }
    .kpi-value { font-size: 34px; }
    .section-title { font-size: 28px; }
    .report-table thead th { font-size: 18px; }
    .report-table td { font-size: 20px; }
  }

  @media (max-width: 768px) {
    #root { padding: 10px; }
    .kpi-row { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    .hero-title { font-size: 30px; }
    .kpi-value { font-size: 30px; }
    .section-title { font-size: 26px; }
    .report-table thead th { font-size: 14px; }
    .report-table td { font-size: 16px; }
  }

  @media print {
    .hero-band,
    .toolbar-card,
    .kpi-row,
    .ingredients-modal,
    .ingredients-modal-backdrop {
      display: none !important;
    }

    #table-container {
      max-height: none !important;
      overflow: visible !important;
    }
  }
</style>

<div id="root" class="bt-header bt-list">
  <div class="report-page">
    <section class="hero-band">
      <h2 class="hero-title">
        <span>Задания цеху</span>
        <span class="spinner-border text-light" role="status" v-if="isWaiting" v-cloak style="margin-left:10px;"></span>
      </h2>
    </section>

    <section class="toolbar-card">
      <div class="toolbar-grid">
        <div class="toolbar-cell">
          <label class="toolbar-label">Период с</label>
          <input type="date" class="form-control" v-model="period_from">
        </div>
        <div class="toolbar-cell">
          <label class="toolbar-label">Период по</label>
          <input type="date" class="form-control" v-model="period_to">
        </div>
        <div>
          <button class="btn btn-primary" v-on:click="onReportClick2">
            <span class="glyphicon glyphicon-triangle-right"></span>
            <span>Сформировать отчет</span>
          </button>
          <button class="btn btn-secondary print-btn" style="margin-left:8px;" onclick="toPrint()">
            <span class="glyphicon glyphicon-print"></span>
            <span>&nbsp;Печать</span>
          </button>
        </div>
      </div>
    </section>

    <section class="kpi-row">
      <div class="kpi-card kpi-a">
        <div class="kpi-label">Разделов</div>
        <div class="kpi-value" v-text="formatKpi(getSectionCount())"></div>
      </div>
      <div class="kpi-card kpi-b">
        <div class="kpi-label">Изделий</div>
        <div class="kpi-value" v-text="formatKpi(getProductCount())"></div>
      </div>
      <div class="kpi-card kpi-c clickable" v-on:click="openIngredientsModal" title="Открыть список ингредиентов">
        <div class="kpi-label">Ингредиентов</div>
        <div class="kpi-value" v-text="formatKpi(getUniqueIngredientCount())"></div>
      </div>
      <div class="kpi-card kpi-d">
        <div class="kpi-label">Итого</div>
        <div class="kpi-value" v-text="formatKpi(getTotalValue())"></div>
      </div>
    </section>

    <div class="period-note" v-text="'Дата отчета: ' + period_to"></div>

    <div class="print-area bt-list-body">
      <div id="table-container" class="row">
        <div id="div_to_print" class="col-12">
          <div id="tab_in_mas_tab" v-for="tab in mas_tab" :key="tab.num" class="section-card">
            <div class="section-head">
              <h3 class="section-title" v-text="mas_tab[tab.num].name"></h3>
            </div>

            <div class="section-body">
              <table class="table table-sm report-table">
                <thead>
                  <tr>
                    <th
                      v-for="field in mas_tab[tab.num].fields"
                      :key="'head-' + tab.num + '-' + field.key"
                      v-text="field.label">
                    </th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    v-for="(row, rowIndex) in mas_tab[tab.num].items"
                    :key="'row-' + tab.num + '-' + rowIndex"
                    :class="{ 'table-info': row && row._rowVariant === 'info' }">
                    <td
                      v-for="field in mas_tab[tab.num].fields"
                      :key="'cell-' + tab.num + '-' + rowIndex + '-' + field.key"
                      :class="field.key === 'name' ? 'cell-left' : 'cell-right'">
                      <span v-if="field.key === 'name'" v-text="row[field.key]"></span>
                      <span v-else v-text="formatCell(row[field.key])"></span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="ingredients-modal-backdrop" v-if="showIngredientsModal" v-on:click="closeIngredientsModal"></div>
    <aside class="ingredients-modal" :class="{ 'is-open': showIngredientsModal }">
      <div class="ingredients-modal-head">
        <h4 class="ingredients-modal-title">Ингредиенты</h4>
        <div class="ingredients-modal-actions">
          <button class="btn btn-sm btn-primary" v-on:click="printIngredientsSummary">Печать</button>
          <button class="btn btn-sm btn-secondary" v-on:click="closeIngredientsModal">Закрыть</button>
        </div>
      </div>
      <div class="ingredients-modal-body">
        <div class="ingredients-summary-meta">
          <span v-text="'Уникальных: ' + formatKpi(getUniqueIngredientCount())"></span>
          <span v-text="' | Общая сумма: ' + formatKpi(getIngredientSummaryTotal())"></span>
        </div>
        <table class="table table-sm report-table">
          <thead>
            <tr>
              <th>Ингредиент</th>
              <th>Сумма</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="(item, index) in ingredientSummaryRows" :key="'ing-' + index">
              <td class="cell-left" v-text="item.name"></td>
              <td class="cell-right" v-text="formatCell(item.sum)"></td>
            </tr>
            <tr v-if="ingredientSummaryRows.length === 0">
              <td colspan="2" class="cell-left">Нет данных за выбранный период</td>
            </tr>
          </tbody>
        </table>
      </div>
    </aside>
  </div>
</div>
