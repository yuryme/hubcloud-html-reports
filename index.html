<div id="root" class="bt-header bt-list">
  <div class="core-shell">
    <header class="core-topbar">
      <div class="core-title-row">
        <h2 class="core-title" v-text="reportTitle"></h2>
        <div class="core-actions">
          <button class="btn btn-primary" v-on:click="loadReport">Отчет</button>
          <button class="btn btn-success" v-on:click="exportToExcel">Excel</button>
          <button class="btn btn-default" v-on:click="printReport">Печать</button>
        </div>
      </div>

      <div class="core-period-row">
        <label>Период:</label>
        <input type="date" class="form-control core-date" v-model="period_from">
        <span class="core-sep">-</span>
        <input type="date" class="form-control core-date" v-model="period_to">
      </div>

      <div class="core-filters" v-if="filters.length > 0">
        <div class="core-filter" v-for="flt in filters" :key="flt.key">
          <label class="core-filter-label" v-text="flt.title"></label>
          <select class="form-control" v-model="filterValues[flt.key]" v-on:change="onFilterChange(flt.key)">
            <option v-for="opt in filterOptions[flt.key] || []" :key="flt.key + '-' + opt.value" :value="opt.value" v-text="opt.title"></option>
          </select>
        </div>
      </div>
    </header>

    <section class="core-table-panel">
      <div class="core-table-scroll">
        <table class="core-table">
          <thead>
            <tr>
              <th v-for="col in columns" :key="'h-' + col.key" :class="col.alignClass || ''" v-text="col.label"></th>
            </tr>
          </thead>
          <tbody>
            <tr v-if="rows.length === 0 && !isWaiting">
              <td :colspan="columns.length" class="core-empty">Нет данных</td>
            </tr>
            <tr v-for="(row, idx) in rows" :key="'r-' + idx">
              <td v-for="col in columns" :key="'c-' + idx + '-' + col.key" :class="cellClass(col, row[col.key])" v-text="formatCell(col, row[col.key])"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</div>
