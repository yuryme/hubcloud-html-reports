<div id="root" class="bt-header bt-list">
  <div class="report-page">
    <header class="report-head">
      <h2 class="report-title">
        Отчет: Себестоимость теста
        <span class="build-badge" v-text="'build ' + buildVersion"></span>
        <span class="spinner-border text-primary" role="status" v-if="isWaiting" v-cloak></span>
      </h2>

      <div class="report-actions">
        <button class="btn btn-primary" v-on:click="onReportClick">
          <span class="glyphicon glyphicon-triangle-right"></span>
          <span>Отчет</span>
        </button>
        <button class="btn btn-success" v-on:click="exportToExcel">
          <span class="glyphicon glyphicon-save"></span>
          <span>Excel</span>
        </button>
      </div>
    </header>

    <section class="table-wrap">
      <table class="table table-sm cost-table">
        <thead
          class="interactive-pointer"
          title="Вывести список"
          v-on:mouseenter="onTableHeaderEnter"
          v-on:mouseleave="onTableHeaderLeave"
          v-on:click.left="onTableHeaderClick">
          <tr>
            <th>Тесто / Ингредиенты</th>
            <th>Кол-во (гр)</th>
            <th>Цена</th>
          </tr>
        </thead>
        <tbody>
          <tr v-if="displayRows.length === 0 && !isWaiting">
            <td colspan="3" class="empty-cell">Нет данных</td>
          </tr>
          <tr
            v-for="(row, index) in displayRows"
            :key="'row-' + index"
            :class="[row.type, 'interactive-pointer']"
            :title="getRowActionTitle(row, index)"
            v-on:click.left="onRecipeRowClick(row, index)">
            <td class="col-name" v-text="row.name"></td>
            <td class="col-number" v-text="formatNumber(row.qtyGr)"></td>
            <td class="col-number" v-text="formatNumber(row.price)"></td>
          </tr>
        </tbody>
      </table>
    </section>

    <div class="dough-modal-backdrop" v-if="showDoughModal" v-on:click="closeDoughModal"></div>
    <aside class="dough-modal" :class="{ 'is-open': showDoughModal }">
      <div class="dough-modal-head">
        <h4 class="dough-modal-title">Наименования теста</h4>
        <button class="btn btn-sm btn-secondary" v-on:click="closeDoughModal">Закрыть</button>
      </div>
      <div class="dough-modal-body">
        <ul class="dough-list">
          <li :class="{ selected: !selectedDoughName }" v-on:click="selectDough('')">Все теста</li>
          <li
            v-for="(name, idx) in getDoughNames()"
            :key="'dough-' + idx"
            :class="{ selected: selectedDoughName === name }"
            v-on:click="selectDough(name)"
            v-text="name">
          </li>
        </ul>
        <div v-if="getDoughNames().length === 0" class="dough-empty">Список пуст</div>
      </div>
    </aside>
  </div>
</div>
