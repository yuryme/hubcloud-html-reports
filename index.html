<style>
  :root {
    --hc-blue: #2a5a8a;
    --hc-blue-dark: #1f4f80;
    --hc-border: #cfd9e4;
    --hc-text: #1f2937;
    --hc-muted: #5e6b79;
    --hc-bg: #f3f5f8;
  }

  .report-shell {
    padding: 14px;
    background: linear-gradient(180deg, #edf2f7 0%, #f8fafc 100%);
    color: var(--hc-text);
    font-family: "Segoe UI", Arial, sans-serif;
    min-height: 100vh;
  }

  .report-page {
    max-width: 1120px;
    margin: 0 auto;
  }

  .hero-lite {
    background: linear-gradient(135deg, var(--hc-blue-dark) 0%, var(--hc-blue) 100%);
    border-radius: 18px;
    padding: 14px 16px;
    margin-bottom: 12px;
    color: #fff;
  }

  .hero-title {
    margin: 0;
    font-size: 44px;
    font-weight: 800;
  }

  .toolbar-lite {
    border: 1px solid var(--hc-border);
    border-radius: 14px;
    background: #fff;
    padding: 12px;
    margin-bottom: 12px;
  }

  .toolbar-grid {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: end;
  }

  .toolbar-label {
    display: block;
    font-size: 12px;
    margin-bottom: 4px;
    color: var(--hc-muted);
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  .kpi-card {
    padding: 8px 10px;
    border: 1px solid var(--hc-border);
    border-radius: 10px;
    background: #fff;
  }

  .kpi-label {
    font-size: 11px;
    color: var(--hc-muted);
  }

  .kpi-value {
    font-size: 40px;
    line-height: 1;
    font-weight: 800;
    color: #1a2f45;
    margin-top: 4px;
  }

  .period-label {
    margin-bottom: 12px;
    color: #374151;
    font-size: 14px;
  }

  .empty-state {
    padding: 12px;
    border: 1px dashed #cbd5e1;
    border-radius: 8px;
    background: #fff;
    margin-bottom: 12px;
  }

  .section-card {
    border: 1px solid var(--hc-border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    background: #fff;
    break-inside: avoid-page;
    page-break-inside: avoid;
  }

  .section-head {
    padding: 10px 12px;
    border-bottom: 1px solid var(--hc-border);
    font-size: 22px;
    font-weight: 800;
    color: #1a2f45;
    background: #f8fafc;
  }

  .section-body {
    padding: 8px;
  }

  .report-table {
    margin-bottom: 0 !important;
    background: #fff;
  }

  .report-table thead th {
    background: #f1f5f9;
    font-size: 13px;
    border-color: #dbe4ef !important;
  }

  .report-table td {
    border-color: #e2e8f0 !important;
    vertical-align: middle;
  }

  .report-table .table-info,
  .report-table .table-info td {
    background: #d9edf7 !important;
  }

  @media print {
    .hero-lite,
    .toolbar-lite,
    .kpi-grid {
      display: none !important;
    }
  }
</style>

<div id="root" class="report-shell">
  <div class="report-page">
    <section class="hero-lite">
      <h2 class="hero-title">Задания цеху</h2>
    </section>

    <section class="toolbar-lite">
      <div class="toolbar-grid">
        <div>
          <label class="toolbar-label">Период с</label>
          <input type="date" class="form-control" v-model="period_from" style="min-width:180px;">
        </div>
        <div>
          <label class="toolbar-label">Период по</label>
          <input type="date" class="form-control" v-model="period_to" style="min-width:180px;">
        </div>
        <div>
          <button type="button" class="btn btn-primary" v-on:click="onReportClick2">Сформировать отчет</button>
          <button type="button" class="btn btn-secondary" style="margin-left:8px;" onclick="toPrint()">Печать</button>
        </div>
      </div>
    </section>

    <section class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Разделов</div>
        <div class="kpi-value" v-text="summaryCards[0].value"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Изделий</div>
        <div class="kpi-value" v-text="summaryCards[1].value"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Строк</div>
        <div class="kpi-value" v-text="summaryCards[2].value"></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Итого</div>
        <div class="kpi-value" v-text="summaryCards[3].value"></div>
      </div>
    </section>

    <div id="div_to_print">
      <div class="period-label" v-text="formattedPeriodLabel"></div>

      <div v-if="!mas_tab.length && !isWaiting" class="empty-state">
        За выбранный период данных нет.
      </div>

      <div v-for="tab in mas_tab" :key="tab.num" class="section-card">
        <div class="section-head" v-text="mas_tab[tab.num].name"></div>
        <div class="section-body">
          <table class="table table-sm table-bordered report-table">
            <thead>
              <tr>
                <th v-for="field in mas_tab[tab.num].fields" :key="field.key" v-text="field.label"></th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="(row, rowIndex) in mas_tab[tab.num].items" :key="rowIndex" :class="{ 'table-info': row._rowVariant === 'info' }">
                <td v-for="field in mas_tab[tab.num].fields" :key="field.key" :style="{ textAlign: field.key === 'name' ? 'left' : 'right' }">
                  <span v-if="field.key === 'name'" v-text="row[field.key]"></span>
                  <span v-else v-text="formatCellValue(row[field.key])"></span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
