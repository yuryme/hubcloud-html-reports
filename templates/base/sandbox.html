<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Base Template Sandbox</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-vue/2.23.1/bootstrap-vue.min.css">
  <link rel="stylesheet" href="./hc-report.css">
  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #f6f8fb 0%, #eef3f6 100%);
      color: #1f2937;
      font-family: "Segoe UI", sans-serif;
    }

    .sandbox-banner {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding: 14px 20px;
      background: #12344d;
      color: #fff;
      box-shadow: 0 10px 25px rgba(18, 52, 77, 0.16);
    }

    .sandbox-banner strong {
      display: block;
      font-size: 15px;
    }

    .sandbox-banner span {
      display: block;
      opacity: 0.8;
      font-size: 13px;
    }

    .sandbox-links a {
      color: #9ee7d7;
      margin-left: 14px;
      font-size: 13px;
    }

    .sandbox-shell {
      min-height: calc(100vh - 68px);
      padding: 18px;
    }

    .sandbox-loading,
    .sandbox-error {
      max-width: 760px;
      margin: 48px auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
    }
  </style>
</head>
<body>
  <div class="sandbox-banner">
    <div>
      <strong>Локальный стенд базового шаблона</strong>
      <span>Проверка, что templates/base совместим с текущим runtime-контрактом.</span>
    </div>
    <div class="sandbox-links">
      <a href="./sandbox.html?mode=mock">mock</a>
      <a href="./sandbox.html?mode=mock&date=2026-03-30">mock + date</a>
    </div>
  </div>

  <div id="sandbox-shell" class="sandbox-shell">
    <div class="sandbox-loading">
      Загружаю базовый шаблон отчета...
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-vue/2.23.1/bootstrap-vue.min.js"></script>
  <script>
    window.HC_QUERY_PARAMETERS = null;
    window.HC_SANDBOX_PARITY_MODE = "hubcloud";

    var cacheKey = Date.now().toString();

    function loadScript(src) {
      return new Promise(function(resolve, reject) {
        var script = document.createElement("script");
        script.src = src + (src.indexOf("?") === -1 ? "?" : "&") + "v=" + cacheKey;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    function loadJson(url, targetName) {
      return fetch(url + "?v=" + cacheKey)
        .then(function(response) {
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }
          return response.json();
        })
        .then(function(payload) {
          window[targetName] = payload || null;
        })
        .catch(function() {
          window[targetName] = null;
        });
    }

    function normalizeBaseSandboxConfigPaths() {
      if (window.HC_REPORT_DEFAULT_CONFIG && window.HC_REPORT_DEFAULT_CONFIG.mockDataFile) {
        window.HC_REPORT_DEFAULT_CONFIG.mockDataFile = "../../" + String(window.HC_REPORT_DEFAULT_CONFIG.mockDataFile).replace(/^\.?\//, "");
      }

      if (window.HC_REPORT_MANIFEST && window.HC_REPORT_MANIFEST.mockDataFile) {
        window.HC_REPORT_MANIFEST.mockDataFile = "../../" + String(window.HC_REPORT_MANIFEST.mockDataFile).replace(/^\.?\//, "");
      }
    }

    function loadText(url, targetName) {
      return fetch(url + "?v=" + cacheKey)
        .then(function(response) {
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }
          return response.text();
        })
        .then(function(payload) {
          window[targetName] = payload || null;
        })
        .catch(function() {
          window[targetName] = null;
        });
    }

    fetch("./index.html?v=" + cacheKey)
      .then(function(response) {
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        return response.text();
      })
      .then(function(html) {
        document.getElementById("sandbox-shell").innerHTML = html.replace(/^<</, "<");
        return loadJson("../../report.default.json", "HC_REPORT_DEFAULT_CONFIG")
          .then(function() {
            return loadJson("../../report.manifest.json", "HC_REPORT_MANIFEST");
          })
          .then(function() {
            normalizeBaseSandboxConfigPaths();
          })
          .then(function() {
            return loadText("../../DS.txt", "HC_REPORT_DS_TEXT");
          })
          .then(function() {
            return loadScript("../../core/script.core.js");
          })
          .then(function() {
            return loadScript("../../script.js");
          });
      })
      .catch(function(error) {
        document.getElementById("sandbox-shell").innerHTML =
          '<div class="sandbox-error">' +
          '<h3>Не удалось открыть базовый стенд</h3>' +
          '<p>Откройте папку через локальный HTTP-сервер, например: <code>python -m http.server 8000</code></p>' +
          '<p>Детали: ' + String(error) + '</p>' +
          '</div>';
      });
  </script>
</body>
</html>
